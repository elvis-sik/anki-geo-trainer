<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GeoTrainer harness — F3 Locate</title>
    <link rel="stylesheet" href="../anki/shared/card.css" />
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #fafbfc;
        color: #1c2430;
      }
      body.dark { background: #121417; color: #e9edf2; }
      .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        padding: 12px 16px;
        border-bottom: 1px solid #e2e7ee;
        position: sticky;
        top: 0;
        background: inherit;
        z-index: 10;
      }
      body.dark .toolbar { border-color: #333941; }
      .toolbar label { font-size: 13px; font-weight: 600; }
      select, button {
        font: inherit;
        padding: 6px 10px;
        border-radius: 8px;
        border: 1px solid #cbd3dd;
        background: #fff;
        cursor: pointer;
      }
      body.dark select, body.dark button { background: #23272d; color: #e9edf2; border-color: #3a414a; }
      button.primary { background: #e24d2c; color: #fff; border-color: #e24d2c; }
      .stage { padding: 8px 16px 40px; }
      .cardframe {
        max-width: 800px;
        margin: 16px auto;
        border: 1px solid #e2e7ee;
        border-radius: 14px;
        background: #fff;
        overflow: hidden;
      }
      body.dark .cardframe { background: #1a1d21; border-color: #333941; }
      .cardframe.nightMode { background: #1a1d21; }
      .status { text-align: center; font-size: 12px; color: #8894a3; padding: 6px; }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <label>Scope
        <select id="scope">
          <option value="us-states" selected>US states</option>
          <option value="europe-countries">Europe countries</option>
        </select>
      </label>
      <label>Mode
        <select id="mode">
          <option value="locate" selected>F3 Locate</option>
          <option value="point">F4 Point-in-region</option>
          <option value="place">F5 Place-the-piece</option>
          <option value="neighbors">F7 Neighbors (retired)</option>
          <option value="draw">F6 Draw</option>
        </select>
      </label>
      <label>Target <select id="target"></select></label>
      <button id="flip" class="primary">Flip to answer ▸</button>
      <button id="reset">Reset attempt</button>
      <label><input type="checkbox" id="night" /> Night mode</label>
      <span class="status" id="status"></span>
    </div>
    <div class="stage">
      <div class="cardframe" id="frame"></div>
    </div>

    <script>
      var SCOPE = "us-states";
      var side = "front";
      var target = "US-CA";
      var mode = "locate";

      function loadBundle(scope) {
        return fetch("../data/bundles/" + scope + ".json").then(function (r) {
          return r.json();
        });
      }

      function loadEngine() {
        return new Promise(function (resolve, reject) {
          var s = document.createElement("script");
          s.src = "../engine/geo-engine.js";
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });
      }

      function fillTargets(bundle) {
        var sel = document.getElementById("target");
        sel.innerHTML = "";
        bundle.regions.filter(function (r) { return r.tier !== 2; }).forEach(function (r) {
          var o = document.createElement("option");
          o.value = r.id;
          o.textContent = r.name;
          sel.appendChild(o);
        });
        target = sel.value = bundle.regions[4] ? sel.options[4].value : sel.options[0].value;
      }

      function switchScope(scope) {
        SCOPE = scope;
        var shapes = fetch("../data/bundles/" + scope + "-shapes.json").then(function (r) {
          return r.json();
        });
        return Promise.all([loadBundle(scope), shapes]).then(function (res) {
          window.GT_BUNDLES = window.GT_BUNDLES || {};
          window.GT_BUNDLES[scope] = res[0];
          window.GT_SHAPES = window.GT_SHAPES || {};
          Object.keys(res[1]).forEach(function (id) {
            window.GT_SHAPES[scope + ":" + id] = res[1][id];
          });
          fillTargets(res[0]);
          side = "front";
        });
      }

      function render() {
        var frame = document.getElementById("frame");
        frame.innerHTML = "";
        frame.className = "cardframe" + (document.body.classList.contains("dark") ? " nightMode" : "");
        var app = document.createElement("div");
        app.className = "gt-app";
        app.setAttribute("data-scope", SCOPE);
        app.setAttribute("data-target", target);
        app.setAttribute("data-side", side);
        app.setAttribute("data-mode", mode);
        var sel = document.getElementById("target");
        app.setAttribute("data-name", sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].textContent : target);
        frame.appendChild(app);
        window.GeoTrainer.mount(app);
        document.getElementById("flip").textContent =
          side === "front" ? "Flip to answer ▸" : "◂ Back to front";
        document.getElementById("status").textContent =
          "mode: " + mode + " · side: " + side + " · target: " + target;
      }

      switchScope(SCOPE)
        .then(function () {
          target = "US-CA";
          document.getElementById("target").value = target;
          return loadEngine();
        })
        .then(render);

      document.getElementById("scope").addEventListener("change", function (e) {
        switchScope(e.target.value).then(render);
      });

      document.getElementById("flip").addEventListener("click", function () {
        side = side === "front" ? "back" : "front";
        render();
      });
      document.getElementById("target").addEventListener("change", function (e) {
        target = e.target.value;
        side = "front";
        render();
      });
      document.getElementById("mode").addEventListener("change", function (e) {
        mode = e.target.value;
        side = "front";
        render();
      });
      document.getElementById("reset").addEventListener("click", function () {
        try {
          localStorage.removeItem("geotrainer:" + mode + ":" + SCOPE + ":" + target);
        } catch (e) {}
        side = "front";
        render();
      });
      document.getElementById("night").addEventListener("change", function (e) {
        document.body.classList.toggle("dark", e.target.checked);
        render();
      });
    </script>
  </body>
</html>
